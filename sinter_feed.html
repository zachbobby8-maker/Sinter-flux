<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SINTER | The Fluid Feed</title>
    <style>
        :root { --bg: #010101; --cyan: #00f0ff; --magenta: #ff00ff; --text: #e0faff; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; }
        nav { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(5,5,10,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,240,255,0.1); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 1000; box-sizing: border-box; }
        .logo { font-size: 1.1rem; font-weight: 900; letter-spacing: 4px; color: var(--cyan); }
        main { width: 100%; max-width: 500px; margin: 0 auto; padding: 75px 10px 100px 10px; display: flex; flex-direction: column; gap: 15px; box-sizing: border-box; }
        .pulse-card { background: rgba(10,10,15,0.95); border: 1px solid rgba(0,240,255,0.1); padding: 18px; position: relative; }
        .pulse-card.architect { border-left: 4px solid var(--magenta); }
        .node-name { font-weight: bold; font-size: 0.9rem; margin-bottom: 4px; }
        .node-tag { font-size: 0.65rem; color: var(--cyan); opacity: 0.7; letter-spacing: 1px; }
        .pulse-content { font-size: 1rem; line-height: 1.5; margin: 15px 0; color: #fff; }
        .pulse-footer { display: flex; gap: 20px; border-top: 1px solid rgba(0,240,255,0.05); padding-top: 12px; font-size: 0.75rem; }
        .stat { display: flex; align-items: center; gap: 6px; color: var(--cyan); opacity: 0.8; }
        .btn-x { background: transparent; border: 1px solid var(--magenta); color: var(--magenta); padding: 5px 10px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; float: right; }
    </style>
</head>
<body>
    <nav><div class="logo">SINTER_FEED</div><div style="font-size:0.6rem; opacity:0.6;">[Φ] LAGOS_HUB</div></nav>
    <main id="feed-container">
        <!-- Pulse cards will be injected here -->
    </main>
    <script>
        const pulses = [
            { name: "Architect_Bobby", tag: "LATTICE_ENTITY", content: "We all enter the world 'naked and alone.' Success isn't distance traveled—it's Depth achieved. How deep is your focus? 👊🌀 #Sinter #5thRev" },
            { name: "Architect_Bobby", tag: "LATTICE_ENTITY", content: "The subconscious is a powerful, faithful, but blind engine. It doesn't know 'good' or 'bad,' only 'Signal' and 'Noise.' 👁️🌀 #VortexEngine" },
            { name: "Apex_Registry", tag: "GOV_NODE // VERIFIED", content: "Lattice stability in Lagos Sector-7 remains at 99.8% after the Mobius Graphene patch. Syntropy confirmed." }
        ];

        const container = document.getElementById('feed-container');
        pulses.forEach(p => {
            const card = document.createElement('div');
            card.className = `pulse-card ${p.name.includes('Bobby') ? 'architect' : ''}`;
            card.innerHTML = `
                <button class="btn-x">Post to X</button>
                <div class="node-name">${p.name}</div>
                <div class="node-tag">${p.tag}</div>
                <div class="pulse-content">${p.content}</div>
                <div class="pulse-footer">
                    <div class="stat">⌬ Resonate</div>
                    <div class="stat">Ξ Interlace</div>
                </div>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
